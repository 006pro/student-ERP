<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Grades - Student ERP</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{layout/base :: header}"></div>
<div class="layout">
    <div th:replace="~{layout/base :: sidebar}"></div>
    <div class="content">
        <h1>Grades</h1>
        <table>
            <thead><tr><th>Roll No</th><th>Name</th><th>Class</th><th>Action</th></tr></thead>
            <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.rollNo}"></td>
                <td th:text="${student.name}"></td>
                <td th:text="${student.className} + '-' + ${student.section}"></td>
                <td><a th:href="@{/grades/student/{id}(id=${student.id})}">View / Add Grades</a></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
