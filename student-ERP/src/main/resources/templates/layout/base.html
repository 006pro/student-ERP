<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' - Student ERP'">Student ERP</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:fragment="header" class="topbar">
    <span class="logo">Student ERP</span>
    <span class="user-info">
            <span sec:authorize="isAuthenticated()" sec:authentication="name"></span>
            &nbsp;|&nbsp;
            <a th:href="@{/logout}">Logout</a>
        </span>
</div>

<div th:fragment="sidebar" class="sidebar">
    <a th:href="@{/dashboard}">Dashboard</a>
    <a sec:authorize="hasRole('STUDENT')" th:href="@{/student-portal}">My Portal</a>
    <a sec:authorize="hasAnyRole('ADMIN','TEACHER')" th:href="@{/students}">Students</a>
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/teachers}">Teachers</a>
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/classrooms}">Classrooms</a>
    <a sec:authorize="hasAnyRole('ADMIN','TEACHER')" th:href="@{/attendance}">Attendance</a>
    <a sec:authorize="hasAnyRole('ADMIN','TEACHER')" th:href="@{/grades}">Grades</a>
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/fees}">Fees</a>
    <a th:href="@{/ai-insights}">AI Insights</a>
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/swagger-ui.html}" target="_blank">API Docs</a>
</div>

</body>
</html>
