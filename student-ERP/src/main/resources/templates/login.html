<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Student ERP</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
<div class="login-box">
    <h2>Student ERP</h2>
    <form th:action="@{/login}" method="post">
        <label>Email</label>
        <input type="text" name="username" required autofocus />
        <label>Password</label>
        <input type="password" name="password" required />
        <button type="submit">Log In</button>
        <p th:if="${param.error}" class="error-msg">Invalid email or password.</p>
        <p th:if="${param.logout}" class="success-msg">You have been logged out.</p>
        <p th:if="${param.registered}" class="success-msg">Account created! Please log in.</p>
    </form>
    <div class="oauth-divider">or</div>
    <a th:href="@{/oauth2/authorization/google}" class="google-btn">Login with Google</a>
    <div class="oauth-divider">Don't have an account? <a th:href="@{/register}">Register</a></div>
</div>
</body>
</html>
