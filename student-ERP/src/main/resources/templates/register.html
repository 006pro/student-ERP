<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Student ERP</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
<div class="login-box">
    <h2>Create Account</h2>
    <form th:action="@{/register}" method="post">
        <label>Email</label>
        <input type="email" name="email" required autofocus />

        <label>Password <small style="color:#999">(min 6 chars)</small></label>
        <input type="password" name="password" required minlength="6" />

        <label>Role</label>
        <select name="role" required>
            <option value="">-- Select Role --</option>
            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
        </select>

        <button type="submit" style="margin-top:16px;width:100%">Register</button>
        <p th:if="${error}" class="error-msg" th:text="${error}"></p>
    </form>
    <div class="oauth-divider">Already have an account? <a th:href="@{/login}">Log In</a></div>
</div>
</body>
</html>
