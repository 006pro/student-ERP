<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Teacher Form - Student ERP</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{layout/base :: header}"></div>
<div class="layout">
    <div th:replace="~{layout/base :: sidebar}"></div>
    <div class="content">
        <h1 th:text="${teacherId} != null ? 'Edit Teacher' : 'Add Teacher'">Add Teacher</h1>
        <form th:action="${teacherId} != null ? @{/teachers/update/{id}(id=${teacherId})} : @{/teachers/save}"
              th:object="${teacher}" method="post">

            <label>Name</label>
            <input type="text" th:field="*{name}" required />

            <label>Email</label>
            <input type="email" th:field="*{email}" required />

            <label>Phone</label>
            <input type="text" th:field="*{phone}" required />

            <label>Subject</label>
            <input type="text" th:field="*{subject}" required />

            <div class="form-actions">
                <button type="submit">Save</button>
                <a th:href="@{/teachers}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
