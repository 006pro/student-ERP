<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Teachers - Student ERP</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{layout/base :: header}"></div>
<div class="layout">
    <div th:replace="~{layout/base :: sidebar}"></div>
    <div class="content">
        <div class="page-header">
            <h1>Teachers</h1>
            <a th:href="@{/teachers/add}" class="btn">+ Add Teacher</a>
        </div>
        <table>
            <thead>
            <tr><th>Name</th><th>Email</th><th>Subject</th><th>Phone</th><th>Classes Handled</th><th>Actions</th></tr>
            </thead>
            <tbody>
            <tr th:each="teacher : ${teachers}">
                <td th:text="${teacher.name}"></td>
                <td th:text="${teacher.email}"></td>
                <td th:text="${teacher.subject}"></td>
                <td th:text="${teacher.phone}"></td>
                <td th:text="${teacher.classesHandled != null and not teacher.classesHandled.empty} ? ${T(java.lang.String).join(', ', teacher.classesHandled)} : 'None'"></td>
                <td>
                    <a th:href="@{/teachers/edit/{id}(id=${teacher.id})}">Edit</a>
                    <form th:action="@{/teachers/delete/{id}(id=${teacher.id})}" method="post" style="display:inline;">
                        <button type="submit" onclick="return confirm('Delete this teacher?');">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
        <p th:if="${teachers.isEmpty()}">No teachers found.</p>
    </div>
</div>
</body>
</html>
